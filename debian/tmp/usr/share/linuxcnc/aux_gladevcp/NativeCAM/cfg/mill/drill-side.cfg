[SUBROUTINE]
version = 1.14
icon = drill-mode.png
name = _("Side Drill")
type = drill-side
help = _("<b>Drill from the side of the workpiece</b>&#10;Top or Bottom: Position = X coordinate&#10;Left or Right:  Position = Y coordinate&#10;Requires Workpiece block above")
order = act h1 side pos h2 depth clr h3 zmode z_cust

[PARAM_ACT]
name = _("Active")
icon = enable.png
type = bool
value = 1

[PARAM_H1]
name = _("Side and Position")
type = sub-header

[PARAM_SIDE]
name = _("Drill side")
type = combo
icon = swap-side.png
options = _("Top - feed Y+=0:Bottom - feed Y-=1:Left - feed X+=2:Right - feed X-=3")
tool_tip = _("Select which face to drill")
value = 0
header = h1

[PARAM_POS]
name = _("Position X or Y")
type = float
icon = xy-axes.png
tool_tip = _("Top or Bottom: X coordinate of hole     Left or Right: Y coordinate of hole")
value = 0.0
metric_value = 0.0
header = h1

[PARAM_H2]
name = _("Drilling")
type = sub-header

[PARAM_DEPTH]
name = _("Drilling depth")
type = float
icon = depth.png
tool_tip = _("Distance the drill enters the workpiece")
value = 0.5
metric_value = 12.0
minimum_value = 0.001
header = h2

[PARAM_CLR]
name = _("Safe clearance")
type = float
icon = safe-z.png
tool_tip = _("Safe distance from workpiece face before feed")
value = 0.1
metric_value = 2.0
minimum_value = 0.0
header = h2

[PARAM_H3]
name = _("Hole Z position")
type = sub-header

[PARAM_ZMODE]
name = _("Z mode")
type = combo-user
icon = align-z.png
options = _("Half - center of workpiece=0:Custom=1")
tool_tip = _("Half: drill at center of workpiece depth. Custom: enter Z coordinate below")
value = 0
header = h3
links = z_cust=1

[PARAM_Z_CUST]
name = _("Custom Z")
type = float
icon = z.png
tool_tip = _("Z coordinate of hole center. Used only when Z mode = Custom")
value = 0.0
metric_value = 0.0
header = h3
hidden = 1

[DEFINITIONS]
content =
;	<eval>self.include_once(file name here)</eval>

[CALL]
content =
	(begin #sub_name)
	(horizontal side drilling)

	o<#self_id_active> if [#param_act AND [#<_tool_usage> EQ 3]]

		o<select> CALL [31] [#param_zmode] [#<surface> - #<wp_depth> / 2] [#param_z_cust]

		o<set_spindle_rpm> CALL [#<_drill_rpm>] [#<_drill_feed>]

		o<drill_side> CALL [#param_side] [#param_pos] [#param_depth] [#31] [#param_clr] [#<wp_front>] [#<wp_rear>] [#<wp_left>] [#<wp_right>]

		o<#self_id_stop> if [#<_spindle_all_time> EQ 0]
			M9 M5
		o<#self_id_stop> endif

	o<#self_id_active> endif
	(end #sub_name)
